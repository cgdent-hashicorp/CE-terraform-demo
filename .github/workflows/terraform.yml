name: Terraform CI/CD

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_VAR_bucket_name: ${{ secrets.TF_VAR_bucket_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/

      - name: Terraform Init
        run: terraform -chdir=terraform init -input=false

      - name: Terraform Format
        run: terraform -chdir=terraform fmt -check

      - name: Terraform Validate
        run: terraform -chdir=terraform validate

      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        run: |
          terraform -chdir=terraform plan -out=tfplan -input=false
          terraform -chdir=terraform show -json tfplan > terraform/tfplan.json

      - name: Evaluate OPA Policies
        if: github.event_name == 'pull_request'
        run: |
          RESULT=$(opa eval \
            --format raw \
            --data policies \
            --input terraform/tfplan.json \
            "data.terraform.security.deny")

          echo "$RESULT"

          if [ "$RESULT" != "[]" ]; then
            echo "OPA policy violations detected"
            exit 1
          fi

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform -chdir=terraform apply -auto-approve -input=false
